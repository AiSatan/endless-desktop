name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build kwinscript package
        run: cd src && zip -r ../endlessdesktop.kwinscript .

      - name: Create release with artifact
        uses: softprops/action-gh-release@v2
        with:
          files: endlessdesktop.kwinscript
